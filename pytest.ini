[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --cov=llm
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov

markers =
    unit: fast unit tests, no external deps
    integration: Flask API tests with mocked LLM
    rag: ChromaDB retrieval tests
    live: requires local Ollama instance
