# nginx/kds.conf
# Reverse proxy for KDS-AI with WebSocket support

upstream kds_app {
    server kds-app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── WebSocket upgrade (KDS real-time screen) ────────────────────────────
    location /ws {
        proxy_pass         http://kds_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API + static ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://kds_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;   # LLM inference can take 60-120s on cold start
        proxy_send_timeout    300s;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Increase for LLM streaming responses
    client_max_body_size 10M;
}